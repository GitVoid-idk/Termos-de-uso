<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar no Clã Kamo</title>
    <style>
        /* Estilo inspirado no visual Dark do Discord */
        body {
            background-color: #2c2f33;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: #23272a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #b9bbbe;
            margin-bottom: 30px;
        }

        .btn-discord {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            transition: background-color 0.3s ease;
            display: inline-block;
        }

        .btn-discord:hover {
            background-color: #4752c4;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #72767d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Clã Kamo</h1>
        <p>Você foi convidado para participar da nossa comunidade no Discord!</p>
        
        <a href="https://discord.gg/z5CuU43AKR" class="btn-discord" target="_blank">
            Entrar no Servidor
        </a>

        <div class="footer">
            Clique no botão acima para ser redirecionado.
        </div>
    </div>

</body>
</html>
